<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISC3003 Practice 06 - Art Store</title>
</head>
<body>
    <h1>Art Store</h1>
    <table>
        <thead>
            <tr>
                <th>Image</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><img src="images/106020.jpg" alt="Girl with a Pearl Earring"></td>
                <td>Girl with a Pearl Earring</td>
                <td>1</td>
                <td>$250.00</td>
                <td>$250.00</td>
            </tr>
            <tr>
                <td><img src="images/116010.jpg" alt="Portrait of a Young Man"></td>
                <td>Portrait of a Young Man</td>
                <td>1</td>
                <td>$175.00</td>
                <td>$175.00</td>
            </tr>
            <tr>
                <td><img src="images/120010.jpg" alt="Portrait of Eleonora di Toledo with her Son"></td>
                <td>Portrait of Eleonora di Toledo with her Son</td>
                <td>1</td>
                <td>$325.00</td>
                <td>$325.00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4">Subtotal</td>
                <td>$750.00</td>
            </tr>
            <tr>
                <td colspan="4">Tax</td>
                <td>$75.00</td>
            </tr>
            <tr>
                <td colspan="4">Shipping</td>
                <td>$40.00</td>
            </tr>
            <tr>
                <td colspan="4">Grand Total</td>
                <td>$865.00</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
